<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ships</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    
    <div class="container mt-5">
        <h1 class="text-center">Starfleet Management - Ship Overview</h1>
    </div>

    <div class="container">
        <div class="row">
            <div class="col">
                <div class="card" >
                    <img class="card-img-top" src="img/USS_Titan.webp" alt="Card image cap">
                    <div class="card-body">
                        <div class="d-flex align-items-space-between justify-content-between">
                            <h5 class="card-title">USS Titan</h5>
                            Status: Active
                        </div>
                        Captain: James T. Kirk
       
                    </div>
                    <div class="card-footer d-flex align-items-space-between justify-content-end">
                        <button class="btn btn-primary">Details</button>
                    </div>
                </div> <!-- /.card -->
            </div> <!-- /.col -->

             <div class="col">
                <div class="card" >
                    <img class="card-img-top" src="img/tos.webp" alt="Card image cap">
                    <div class="card-body">
                        <div class="d-flex align-items-space-between justify-content-between">
                            <h5 class="card-title">USS Titan</h5>
                            Status: Active
                        </div>
                        Captain: James T. Kirk
       
                    </div>
                    <div class="card-footer d-flex align-items-space-between justify-content-end">
                        <button class="btn btn-primary">Details</button>
                    </div>
                </div> <!-- /.card -->
            </div> <!-- /.col -->
           
        </div> <!-- /.row -->

    </div>

    



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
