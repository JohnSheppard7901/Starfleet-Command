<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>New Mission</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  </head>
  <body>
      <div class="container mt-5">
        <h1 class="text-center">Starfleet Management</h1>
    </div>
  

    <div class="container">
      <!-- <div class="row d-flex justify-content-center">
            <div class="col-6 mt-4 my-auto">
              <img src="img/mapA.jpg" alt="map of alpha and beta quadrant" class="w-100">
            </div>
          </div> -->
      <div class="row">
        <div class="col"></div>
        <div class="col-lg-6 border border-5 rounded shadow p-4 m-5">
          <h2 class="text-center m-4">Create a new mission</h2>      
          <form id="createMissionForm">
            <div class="row g-3">

              <!-- Mission Name -->
              <div class="col-12">
                <label for="missionName" class="form-label">Mission Name</label>
                <input type="text" class="form-control" id="missionName" required>
              </div>

              <!-- Description -->
              <div class="col-12">
                <label for="missionDescription" class="form-label">Description</label>
                <textarea class="form-control" id="missionDescription" rows="5"
                placeholder="Describe the mission objective..." required></textarea>
              </div>

              <!--  Sector -->
              <div class="col-12">
                <label for="missionSector" class="form-label">Sector</label>
                <input type="text" class="form-control" id="missionSector" required>
              </div>

              <!-- Difficulty + Sector -->
              <div class="col-md-6">
                <label for="missionDifficulty" class="form-label">Difficulty</label>
                <select class="form-select" id="missionDifficulty" required>
                  <option value="" disabled selected>Select difficulty</option>
                  <option value="easy">Easy</option>
                  <option value="medium">Medium</option>
                  <option value="hard">Hard</option>
                </select>
              </div>

              <!-- Duration -->
              <div class="col-md-6">
                <label for="missionDuration" class="form-label">Duration (minutes)</label>
                <input type="number" class="form-control" id="missionDuration" min="1" max="60" required>
              </div>

            </div><!-- /.row -->

            <!-- Buttons -->
            <div class="d-flex justify-content-end gap-2 mt-4">
              <button type="button" class="btn btn-outline-secondary" id="resetBtn">
                Clear
              </button>
              <button type="submit" class="btn btn-primary">
                <i class="bi bi-rocket-takeoff-fill me-1"></i> Transmit Mission
              </button>
            </div>
          </form>
        </div>
        <div class="col"></div>
      </div> <!-- /row  -->

      <div id="navToMissionsOverview" class="d-flex justify-content-end">
        <button class="btn btn-outline-primary"> <i class="bi bi-arrow-left-circle me-1"></i> Get back to Missions Overview</button>
      </div>

      <div class="row d-flex justify-content-center">
        <div class="col-lg-6 my-auto">
          <div class="alert alert-success mx-4 d-none" id="successAlert">
            <i class="bi bi-check2-circle mx-2"></i>
            Mission successfully transmitted to Starfleet Command.
          </div>
        </div>
      </div>  
      
      <div class="row d-flex justify-content-center">
        <div class="col-lg-6 my-auto mx-5 border-5 rounded-3 shadow p-4 d-none" id="newMissionsContainer">
          <h3 class="text-center mb-3">Created Missions</h3>
          <ul class="list-group">
          </ul>
        </div>
      </div>

    </div>

</div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="js/new-mission.js"></script>
  </body>
</html>
